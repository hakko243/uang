<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tracker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f4f6f9;
      padding:20px;
    }

    h1{
      margin-bottom:20px;
      color:#222;
    }

    .container{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .card h2{
      margin-bottom:15px;
      color:#333;
    }

    input, select, button{
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

button:hover{
      background:#1d4ed8;
    }

    .list{
      margin-top:15px;
    }

    .item{
      background:#f8fafc;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
      border-left:5px solid #2563eb;
    }

    .income{
      border-left-color:green;
    }

    .expense{
      border-left-color:red;
    }

    .high{
      border-left-color:red;
    }

    .medium{
      border-left-color:orange;
    }

    .low{
      border-left-color:green;
    }

    .summary{
      display:flex;
      gap:20px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .summary .box{
      flex:1;
      min-width:180px;
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .summary h3{
      margin-bottom:10px;
    }

    @media(max-width:768px){
      .container{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

    <h1>Money Tracker & Wishlist</h1>

<div class="summary">
  <div class="box">
    <h3>Total Pemasukan</h3>
    <h2 id="incomeTotal">Rp 0</h2>
  </div>

  <div class="box">
    <h3>Total Pengeluaran</h3>
    <h2 id="expenseTotal">Rp 0</h2>
  </div>

  <div class="box">
    <h3>Sisa Uang</h3>
    <h2 id="balance">Rp 0</h2>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>Tambah Keuangan</h2>

    <select id="jenis">
      <option value="Pemasukan">Pemasukan</option>
      <option value="Pengeluaran">Pengeluaran</option>
    </select>

    <input type="text" id="keterangan" placeholder="Keterangan">

    <input type="number" id="jumlah" placeholder="Jumlah uang">

    <button onclick="tambahKeuangan()">Simpan</button>

    <div class="list" id="keuanganList"></div>
  </div>

  <div class="card">
    <h2>Wishlist Barang</h2>

    <input type="text" id="namaBarang" placeholder="Nama barang">

    <input type="number" id="hargaBarang" placeholder="Harga barang">

    <select id="urgensi">
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>

    <button onclick="tambahWishlist()">Tambah Wishlist</button>

    <select id="filterUrgensi" onchange="renderWishlist()">
      <option value="all">Semua Urgensi</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>

    <input type="number" id="maxHarga" placeholder="Filter harga maksimum" oninput="renderWishlist()">

    <div class="list" id="wishlist"></div>
  </div>

</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwCd43MDgrJ7eyPAilV4XlZebCyXscUwk0M08d0Ixj0JAe3ryTlhzpUebt7X821xxwp/exec";

let keuanganData = [];
let wishlistData = [];

function formatRupiah(angka){
  return 'Rp ' + angka.toLocaleString('id-ID');
}

function updateSummary(){
  let income = 0;
  let expense = 0;

  keuanganData.forEach(item => {
    if(item.jenis === 'Pemasukan'){
      income += item.jumlah;
    }else{
      expense += item.jumlah;
    }
  });

  document.getElementById('incomeTotal').innerText = formatRupiah(income);
  document.getElementById('expenseTotal').innerText = formatRupiah(expense);
  document.getElementById('balance').innerText = formatRupiah(income - expense);
}

function renderKeuangan(){
  const list = document.getElementById('keuanganList');
  list.innerHTML = '';

  keuanganData.forEach(item => {
    list.innerHTML += `
      <div class="item ${item.jenis === 'Pemasukan' ? 'income' : 'expense'}">
        <b>${item.jenis}</b><br>
        ${item.keterangan}<br>
        ${formatRupiah(item.jumlah)}
      </div>
    `;
  });

  updateSummary();
}

async function tambahKeuangan(){
  const jenis = document.getElementById('jenis').value;
  const keterangan = document.getElementById('keterangan').value;
  const jumlah = parseInt(document.getElementById('jumlah').value);

  if(!keterangan || !jumlah){
    alert('Isi semua data');
    return;
  }

  const data = {
    type:'keuangan',
    jenis,
    keterangan,
    jumlah
  };

  await fetch(WEBAPP_URL, {
    method:'POST',
    body:JSON.stringify(data)
  });

   keuanganData.push({jenis, keterangan, jumlah});

  renderKeuangan();

  document.getElementById('keterangan').value = '';
  document.getElementById('jumlah').value = '';
}

function renderWishlist(){
  const list = document.getElementById('wishlist');
  list.innerHTML = '';

  const filterUrgensi = document.getElementById('filterUrgensi').value;
  const maxHarga = document.getElementById('maxHarga').value;

  let data = wishlistData;

  if(filterUrgensi !== 'all'){
    data = data.filter(item => item.urgensi === filterUrgensi);
  }

  if(maxHarga){
    data = data.filter(item => item.harga <= parseInt(maxHarga));
  }

  data.forEach(item => {
    list.innerHTML += `
      <div class="item ${item.urgensi.toLowerCase()}">
        <b>${item.nama}</b><br>
        Harga: ${formatRupiah(item.harga)}<br>
        Urgensi: ${item.urgensi}
      </div>
    `;
  });
  }

  async function tambahWishlist(){
  const nama = document.getElementById('namaBarang').value;
  const harga = parseInt(document.getElementById('hargaBarang').value);
  const urgensi = document.getElementById('urgensi').value;

  if(!nama || !harga){
    alert('Isi semua data');
    return;
  }

  const data = {
    type:'wishlist',
    nama,
    harga,
    urgensi,
    status:'Belum Dibeli'
  };

  await fetch(WEBAPP_URL, {
    method:'POST',
    body:JSON.stringify(data)
  });

  wishlistData.push({nama, harga, urgensi});

  renderWishlist();

  document.getElementById('namaBarang').value = '';
  document.getElementById('hargaBarang').value = '';
}

</script>

</body>
</html>
